name: build-image-and-push

on:
  push:
    branches: master
    paths:
      - 'Dockerfile*'
      - '.github/workflows/**'
  schedule:
    - cron: '21 3 * * 0' # weekly build
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/dictcp/utils

jobs:
  build-amd64:
    strategy:
      matrix:
        target: [full, ubuntu2604, ubuntu2404, ubuntu2204, alpine]
      fail-fast: false
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@v6
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      -
        name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.CR_PAT }}
      -
        name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
      -
        name: Build and push by digest (linux/amd64)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.${{ matrix.target }}
          platforms: linux/amd64
          outputs: type=image,name=${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          labels: ${{ steps.meta.outputs.labels }}
      -
        name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"
      -
        name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-amd64-${{ matrix.target }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  build-arm:
    strategy:
      matrix:
        target: [full, ubuntu2604, ubuntu2404, ubuntu2204, alpine]
      fail-fast: false
    runs-on: ubuntu-24.04-arm
    steps:
      -
        name: Checkout
        uses: actions/checkout@v6
      -
        name: Set up QEMU (riscv64 only, for ubuntu2604)
        if: matrix.target == 'ubuntu2604'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: riscv64
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      -
        name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.CR_PAT }}
      -
        name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
      -
        name: Build and push by digest (arm)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.${{ matrix.target }}
          platforms: ${{ matrix.target == 'ubuntu2604' && 'linux/arm64,linux/arm/v7,linux/riscv64' || 'linux/arm64' }}
          outputs: type=image,name=${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          labels: ${{ steps.meta.outputs.labels }}
      -
        name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"
      -
        name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-arm-${{ matrix.target }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    needs: [build-amd64, build-arm]
    strategy:
      matrix:
        target: [full, ubuntu2604, ubuntu2404, ubuntu2204, alpine]
      fail-fast: false
    runs-on: ubuntu-latest
    steps:
      -
        name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*-${{ matrix.target }}
          merge-multiple: true
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      -
        name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ matrix.target }}
            type=raw,value=latest,enable=${{ matrix.target == 'ubuntu2604' }}
            type=raw,value=lite,enable=${{ matrix.target == 'ubuntu2604' }}
            type=raw,value=ubuntu,enable=${{ matrix.target == 'ubuntu2604' }}
      -
        name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.CR_PAT }}
      -
        name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.IMAGE_NAME }}@sha256:%s ' *)
      -
        name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
